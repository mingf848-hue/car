<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Polymarket 自动跟单工作台</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="workspace">
      <header class="app-header">
        <div>
          <p class="eyebrow">Polymarket Sports Copy</p>
          <h1>自动跟单工作台</h1>
          <p id="system-line">正在连接服务...</p>
        </div>
        <div class="header-actions">
          <button class="ghost-button" id="refresh-button">刷新</button>
          <button class="ghost-button" id="diagnose-button">诊断</button>
          <button class="primary-button" id="manual-scan-button">手动补查</button>
        </div>
      </header>

      <section class="ops-grid" aria-live="polite">
        <article class="ops-card main-state" id="state-card">
          <span>自动状态</span>
          <strong id="state-title">加载中</strong>
          <p id="state-detail">后台会自动检查已启用的钱包。</p>
        </article>
        <article class="ops-card">
          <span>跟单钱包</span>
          <strong id="active-wallet-count">-</strong>
          <p id="active-wallet-detail">启用后自动跟单。</p>
        </article>
        <article class="ops-card">
          <span>跟单金额</span>
          <strong id="copy-size">-</strong>
          <p>每个新买单固定金额。</p>
        </article>
        <article class="ops-card">
          <span>自己的钱包</span>
          <strong id="execution-wallet-title">-</strong>
          <p id="execution-wallet-detail">读取配置中。</p>
        </article>
        <article class="ops-card">
          <span>最近检查</span>
          <strong id="last-check">-</strong>
          <p id="next-check">等待后台轮询。</p>
        </article>
      </section>

      <section class="action-rail">
        <button class="rail-action active" data-section="followed-section">跟单钱包</button>
        <button class="rail-action" data-section="discover-section">发现候选</button>
        <button class="rail-action" data-section="detail-section">下注详情</button>
        <button class="rail-action" data-section="events-section">事件流水</button>
      </section>

      <section class="layout-grid">
        <article class="panel wallet-panel" id="followed-section">
          <div class="panel-head">
            <div>
              <h2>正在跟单的钱包</h2>
              <p>这里的钱包会被后台自动轮询；可随时暂停或恢复。</p>
            </div>
          </div>
          <form class="wallet-add" id="wallet-add-form">
            <input id="wallet-address-input" name="wallet" placeholder="粘贴 0x 钱包地址" autocomplete="off" spellcheck="false" />
            <button class="secondary-button" type="submit">添加</button>
          </form>
          <div id="followed-wallets" class="wallet-list"></div>
        </article>

        <article class="panel discover-panel" id="discover-section">
          <div class="panel-head">
            <div>
              <h2>候选聪明钱包</h2>
              <p>来自体育排行榜。先查看下注，再决定是否跟单。</p>
            </div>
            <button class="secondary-button" id="discover-button">加载候选</button>
          </div>
          <div id="candidate-wallets" class="candidate-list"></div>
        </article>

        <article class="panel detail-panel" id="detail-section">
          <div class="panel-head">
            <div>
              <h2>钱包下注详情</h2>
              <p id="detail-subtitle">选择一个钱包后查看近期买卖。</p>
            </div>
            <button class="secondary-button" id="follow-selected-button" disabled>跟单此钱包</button>
          </div>
          <div class="segmented" id="trade-filter">
            <button class="active" data-filter="ALL">全部</button>
            <button data-filter="BUY">买入</button>
            <button data-filter="SELL">卖出</button>
            <button data-filter="UNKNOWN">未识别</button>
          </div>
          <div class="detail-summary" id="detail-summary"></div>
          <div id="trade-list" class="trade-list"></div>
        </article>

        <article class="panel positions-panel">
          <div class="panel-head">
            <div>
              <h2>本地持仓</h2>
              <p>只显示本程序自己跟单产生的仓位。</p>
            </div>
          </div>
          <div id="positions-list" class="compact-list"></div>
        </article>

        <article class="panel events-panel" id="events-section">
          <div class="panel-head">
            <div>
              <h2>事件流水</h2>
              <p>自动跟买、跳过、预热、风控都会记录。</p>
            </div>
          </div>
          <div id="events-list" class="event-list"></div>
        </article>
      </section>
    </main>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <script src="/static/app.js"></script>
  </body>
</html>
