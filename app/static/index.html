<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Polymarket AI 跟单</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="app-topbar">
        <div>
          <span class="eyebrow">AI Copy Trading</span>
          <h1>Polymarket 跟单</h1>
        </div>
        <div class="top-actions">
          <button class="icon-button" id="diagnose-button" aria-label="诊断">诊断</button>
          <button class="icon-button primary" id="refresh-button" aria-label="刷新">刷新</button>
        </div>
      </header>

      <section class="screen active" id="screen-home" data-screen="home">
        <article class="hero-card" id="state-card">
          <div class="hero-row">
            <span>已实现盈亏</span>
            <b id="mode-pill">读取中</b>
          </div>
          <strong id="net-pnl">$0.00</strong>
          <p id="state-detail">正在连接自动跟单服务。</p>
          <div class="hero-metrics">
            <div><span>可用余额</span><strong id="balance-value">--</strong><small id="balance-label">读取中</small></div>
            <div><span>跟单投入</span><strong id="buy-total">$0.00</strong><small id="copy-size">每单 $5.00</small></div>
            <div><span>持仓</span><strong id="position-count">0</strong><small id="open-cost">$0.00 成本</small></div>
          </div>
        </article>

        <section class="section-block">
          <div class="section-head">
            <div>
              <h2>AI 推荐跟单</h2>
              <p id="ai-mode">正在分析候选钱包。</p>
            </div>
            <button class="text-button" id="recommend-refresh-button">重新分析</button>
          </div>
          <div class="recommend-strip" id="home-recommendations"></div>
        </section>

        <section class="section-block">
          <div class="section-head">
            <div>
              <h2>本地持仓</h2>
              <p>只显示本程序跟单产生的仓位。</p>
            </div>
          </div>
          <div class="compact-stack" id="positions-list"></div>
        </section>
      </section>

      <section class="screen" id="screen-ai" data-screen="ai">
        <div class="section-head sticky-head">
          <div>
            <h2>AI 钱包推荐</h2>
            <p>综合盈利、成交、活跃度和近期下注。</p>
          </div>
          <button class="text-button" id="ai-load-button">刷新</button>
        </div>
        <div class="recommend-list" id="recommendation-list"></div>
      </section>

      <section class="screen" id="screen-wallets" data-screen="wallets">
        <form class="wallet-add-card" id="wallet-add-form">
          <label for="wallet-address-input">添加跟单钱包</label>
          <div>
            <input id="wallet-address-input" name="wallet" placeholder="粘贴 0x 钱包地址" autocomplete="off" spellcheck="false" />
            <button type="submit">添加</button>
          </div>
        </form>
        <div class="section-head">
          <div>
            <h2>正在跟单</h2>
            <p id="active-wallet-detail">还没有选择钱包。</p>
          </div>
          <button class="text-button" id="manual-scan-button">立即补查</button>
        </div>
        <div class="wallet-stack" id="followed-wallets"></div>
      </section>

      <section class="screen" id="screen-detail" data-screen="detail">
        <article class="wallet-profile">
          <span id="detail-kicker">下注详情</span>
          <h2 id="detail-title">选择钱包</h2>
          <p id="detail-subtitle">从 AI 推荐或跟单钱包进入。</p>
          <button class="primary-wide" id="follow-selected-button" disabled>跟单此钱包</button>
        </article>
        <div class="segmented" id="trade-filter">
          <button class="active" data-filter="ALL">全部</button>
          <button data-filter="BUY">买入</button>
          <button data-filter="SELL">卖出</button>
        </div>
        <div class="detail-summary" id="detail-summary"></div>
        <div class="trade-stack" id="trade-list"></div>
      </section>

      <section class="screen" id="screen-events" data-screen="events">
        <div class="section-head sticky-head">
          <div>
            <h2>事件流水</h2>
            <p>自动跟买、跳过、预热、风控。</p>
          </div>
        </div>
        <div class="event-stack" id="events-list"></div>
      </section>

      <nav class="bottom-nav" aria-label="主导航">
        <button class="active" data-nav="home">首页</button>
        <button data-nav="ai">AI 推荐</button>
        <button data-nav="wallets">钱包</button>
        <button data-nav="detail">详情</button>
        <button data-nav="events">流水</button>
      </nav>
    </main>

    <div class="sheet-backdrop" id="sheet-backdrop"></div>
    <aside class="trade-sheet" id="trade-sheet" aria-hidden="true">
      <div class="sheet-handle"></div>
      <button class="sheet-close" id="sheet-close-button">关闭</button>
      <div id="sheet-content"></div>
    </aside>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <script src="/static/app.js"></script>
  </body>
</html>
